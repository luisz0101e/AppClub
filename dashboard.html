<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Legión App - Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --club-gold: #C5A059; --bg-deep: #050505; --card-bg: #0e0e0e; --text-muted: #888; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Urbanist', sans-serif; }
        body { background-color: var(--bg-deep); color: white; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* HEADER */
        .top-bar { background: var(--card-bg); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1a1a1a; }
        .top-bar img { height: 35px; }
        .user-info { display: flex; align-items: center; gap: 10px; color: var(--club-gold); font-weight: 900; text-transform: uppercase; font-size: 0.8rem; }
        .avatar { width: 32px; height: 32px; border: 1px solid var(--club-gold); border-radius: 50%; display: flex; justify-content: center; align-items: center; }

        .main-content { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        .section-title { font-size: 1rem; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; color: var(--club-gold); border-bottom: 1px solid #1a1a1a; padding-bottom: 10px; }

        /* MATCH CARD */
        .match-card { background: var(--card-bg); border-radius: 12px; padding: 25px; border: 1px solid #1a1a1a; margin-bottom: 30px; text-align: center; }
        .teams { display: flex; justify-content: space-around; align-items: center; margin: 20px 0; }
        .team { display: flex; flex-direction: column; align-items: center; gap: 10px; font-weight: 900; font-size: 0.8rem; }
        .team-logo { width: 60px; height: 60px; background: #151515; border-radius: 50%; display: flex; justify-content: center; align-items: center; border: 1px solid #222; }
        .team-logo img { width: 40px; height: 40px; object-fit: contain; }
        .vs { color: var(--club-gold); font-size: 1.5rem; font-weight: 900; }
        .match-info { background: #000; padding: 10px; border-radius: 4px; color: var(--club-gold); font-size: 0.75rem; font-weight: 700; }

        /* CANCHA 3D PRO */
        .plantilla-container { display: flex; gap: 20px; height: 500px; }
        .pitch-3d {
            flex: 1.5; background: #0f2e0f; border-radius: 8px; position: relative; border: 2px solid rgba(255,255,255,0.1);
            perspective: 800px; overflow: hidden;
        }
        .pitch-lines {
            width: 100%; height: 100%; position: absolute; border: 2px solid rgba(255,255,255,0.3);
            transform: rotateX(20deg); transform-origin: bottom;
            background-image: repeating-linear-gradient(0deg, #1a3a1a, #1a3a1a 10%, #163316 10%, #163316 20%);
        }
        .player-pin {
            position: absolute; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center;
        }
        .shirt {
            width: 26px; height: 26px; background: white; color: black; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900;
            border: 2px solid var(--club-gold); box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .p-name { background: rgba(0,0,0,0.8); font-size: 8px; padding: 2px 5px; margin-top: 4px; border-radius: 3px; font-weight: 700; white-space: nowrap; }

        /* LISTA JUGADORES */
        .player-list { flex: 1; overflow-y: auto; padding-right: 10px; }
        .player-list::-webkit-scrollbar { width: 4px; }
        .player-list::-webkit-scrollbar-thumb { background: var(--club-gold); }
        .p-item {
            background: #0a0a0a; border: 1px solid #1a1a1a; padding: 12px; border-radius: 6px;
            display: flex; align-items: center; gap: 15px; margin-bottom: 8px;
        }
        .p-number { color: var(--club-gold); font-weight: 900; font-size: 1.2rem; }
        .p-data h4 { font-size: 0.9rem; font-weight: 700; }
        .p-data p { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; }

        /* NAV */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; background: #0a0a0a; display: flex;
            justify-content: space-around; padding: 15px 0 25px; border-top: 1px solid #1a1a1a;
        }
        .nav-btn { color: var(--text-muted); text-decoration: none; font-size: 0.7rem; font-weight: 900; text-transform: uppercase; display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer;}
        .nav-btn.active { color: var(--club-gold); }

        @media (max-width: 768px) {
            .plantilla-container { flex-direction: column; height: auto; }
            .pitch-3d { height: 350px; }
            .player-list { height: 400px; }
        }
    </style>
</head>
<body>
    <header class="top-bar">
        <img src="./escudolegion.png">
        <div class="user-info">
            <span id="userName">Socio</span>
            <div class="avatar">👤</div>
        </div>
    </header>

    <main class="main-content">
        <div id="tab-hoy" class="tab-content active">
            <h3 class="section-title">Próximo Encuentro</h3>
            <div class="match-card">
                <p id="torneoText" style="font-size: 0.7rem; letter-spacing: 2px; color: var(--text-muted);">CAMPEONATO OFICIAL</p>
                <div class="teams">
                    <div class="team"><div class="team-logo"><img src="./escudolegion.png"></div>LEGION</div>
                    <div class="vs">VS</div>
                    <div class="team"><div class="team-logo" id="rivalLogo">🛡️</div><span id="rivalName">RIVAL</span></div>
                </div>
                <div class="match-info" id="matchFooter">📅 POR DEFINIR</div>
            </div>
        </div>

        <div id="tab-plantilla" class="tab-content" style="display:none;">
            <h3 class="section-title">Formación y Plantel</h3>
            <div class="plantilla-container">
                <div class="pitch-3d">
                    <div class="pitch-lines"></div>
                    <div class="player-pin" style="left:50%; top:85%;"><div class="shirt">1</div><div class="p-name">LITUMA</div></div>
                    <div class="player-pin" style="left:20%; top:65%;"><div class="shirt">2</div><div class="p-name">GUARTAZACA</div></div>
                    <div class="player-pin" style="left:40%; top:70%;"><div class="shirt">19</div><div class="p-name">PEREZ</div></div>
                    <div class="player-pin" style="left:60%; top:70%;"><div class="shirt">10</div><div class="p-name">ESTUPIÑAN</div></div>
                    <div class="player-pin" style="left:80%; top:65%;"><div class="shirt">4</div><div class="p-name">PESANTEZ</div></div>
                    <div class="player-pin" style="left:50%; top:45%;"><div class="shirt">16</div><div class="p-name">PUNIN</div></div>
                    <div class="player-pin" style="left:30%; top:35%;"><div class="shirt">23</div><div class="p-name">AYUI</div></div>
                    <div class="player-pin" style="left:70%; top:35%;"><div class="shirt">6</div><div class="p-name">CAÑAR</div></div>
                    <div class="player-pin" style="left:20%; top:15%;"><div class="shirt">11</div><div class="p-name">JARAMILLO</div></div>
                    <div class="player-pin" style="left:50%; top:10%;"><div class="shirt">14</div><div class="p-name">PESANTEZ</div></div>
                    <div class="player-pin" style="left:80%; top:15%;"><div class="shirt">3</div><div class="p-name">GALLO</div></div>
                </div>
                <div class="player-list" id="listaCompleta">
                    </div>
            </div>
        </div>
    </main>

    <nav class="bottom-nav">
        <div class="nav-btn active" onclick="showTab('hoy')"><span>🏠</span>HOY</div>
        <div class="nav-btn" onclick="showTab('plantilla')"><span>👥</span>PLANTILLA</div>
        <a href="index.html" class="nav-btn"><span>🚪</span>SALIR</a>
    </nav>

    <script>
        document.getElementById('userName').textContent = localStorage.getItem('usuarioLegion') || 'Socio';

        function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tab).style.display = 'block';
            event.currentTarget.classList.add('active');
        }

        // Cargar partido desde Admin
        const data = JSON.parse(localStorage.getItem('proxPartidoLegion'));
        if(data) {
            document.getElementById('rivalName').textContent = data.rival;
            document.getElementById('torneoText').textContent = data.torneo;
            document.getElementById('matchFooter').textContent = `📅 ${data.fecha} - ${data.hora} | 🏟️ ${data.estadio}`;
            if(data.logoRival) document.getElementById('rivalLogo').innerHTML = `<img src="${data.logoRival}">`;
        }

        // Cargar Lista Jugadores (Demo 24)
        const jugadores = [
            {n:1, name:"LITUMA LUIS", p:"POR"}, {n:2, name:"GUARTAZACA M.", p:"LTI"},
            {n:19, name:"PEREZ E.", p:"DFC"}, {n:10, name:"ESTUPIÑAN J.", p:"DFC"},
            {n:4, name:"PESANTEZ A.", p:"LTD"}, {n:16, name:"PUNIN B.", p:"MCD"},
            {n:23, name:"AYUI G.", p:"II"}, {n:6, name:"CAÑAR B.", p:"ID"},
            {n:11, name:"JARAMILLO I.", p:"EI"}, {n:14, name:"PESANTEZ P.", p:"DC"},
            {n:3, name:"GALLO B.", p:"ED"}
        ];
        const lista = document.getElementById('listaCompleta');
        jugadores.forEach(j => {
            lista.innerHTML += `<div class="p-item"><div class="p-number">${j.n}</div><div class="p-data"><h4>${j.name}</h4><p>${j.p}</p></div></div>`;
        });
    </script>
</body>
</html>
