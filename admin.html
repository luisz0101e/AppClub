<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legión Admin - Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --club-gold: #C5A059; --bg-deep: #050505; --card-bg: #111; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Urbanist', sans-serif; }
        body { background: var(--bg-deep); color: white; display: flex; height: 100vh; }
        .sidebar { width: 280px; background: #000; border-right: 1px solid #222; padding: 40px 20px; display: flex; flex-direction: column; gap: 30px; }
        .sidebar h2 { color: var(--club-gold); font-size: 1.2rem; letter-spacing: 2px; text-align: center; }
        .nav-link { color: #888; text-decoration: none; font-weight: 700; font-size: 0.8rem; padding: 12px; border-radius: 4px; transition: 0.3s; }
        .nav-link.active, .nav-link:hover { background: #111; color: var(--club-gold); border-left: 3px solid var(--club-gold); }
        .main { flex: 1; padding: 60px; overflow-y: auto; }
        .card { background: var(--card-bg); padding: 40px; border-radius: 8px; border: 1px solid #222; max-width: 700px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        label { display: block; font-size: 0.7rem; font-weight: 900; color: var(--club-gold); margin-bottom: 8px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: white; border-radius: 4px; outline: none; }
        .btn-save { background: var(--club-gold); color: black; border: none; padding: 15px; width: 100%; margin-top: 30px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        #toast { position: fixed; bottom: 20px; right: 20px; background: #2A803A; padding: 15px 30px; border-radius: 4px; display: none; }
    </style>
</head>
<body>
    <div class="sidebar">
        <img src="./escudolegion.png" style="width: 80px; margin: 0 auto;">
        <h2>ADMIN PANEL</h2>
        <a href="#" class="nav-link active">ACTUALIZAR PARTIDO</a>
        <a href="index.html" class="nav-link" style="color: #ff4444; margin-top: auto;">CERRAR SESIÓN</a>
    </div>
    <div class="main">
        <h1 style="margin-bottom: 40px; font-size: 2.5rem;">GESTIÓN DE <span>CONTENIDOS</span></h1>
        <div class="card">
            <form id="partidoForm">
                <div class="form-grid">
                    <div><label>Rival</label><input type="text" id="rival" required></div>
                    <div><label>Torneo</label><input type="text" id="torneo" required></div>
                    <div><label>Fecha</label><input type="date" id="fecha" required></div>
                    <div><label>Hora</label><input type="time" id="hora" required></div>
                    <div style="grid-column: 1/3;"><label>Estadio</label><input type="text" id="estadio" required></div>
                    <div style="grid-column: 1/3;"><label>Escudo Rival</label><input type="file" id="logoRival" accept="image/*"></div>
                </div>
                <button type="submit" class="btn-save">Publicar en la App</button>
            </form>
        </div>
    </div>
    <div id="toast">¡Actualizado con éxito! ✅</div>
    <script>
        document.getElementById('partidoForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const file = document.getElementById('logoRival').files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                const data = {
                    rival: document.getElementById('rival').value,
                    torneo: document.getElementById('torneo').value,
                    fecha: document.getElementById('fecha').value,
                    hora: document.getElementById('hora').value,
                    estadio: document.getElementById('estadio').value,
                    logoRival: event.target.result
                };
                localStorage.setItem('proxPartidoLegion', JSON.stringify(data));
                const t = document.getElementById('toast');
                t.style.display = 'block';
                setTimeout(() => t.style.display = 'none', 3000);
            };
            if(file) reader.readAsDataURL(file);
            else reader.onload({target: {result: null}});
        });
    </script>
</body>
</html>
