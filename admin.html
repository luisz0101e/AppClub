<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legión Admin - Gestión Total</title>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --club-gold: #C5A059; --bg-deep: #050505; --card-bg: #111; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Urbanist', sans-serif; }
        body { background: var(--bg-deep); color: white; display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR PRO */
        .sidebar { width: 280px; background: #000; border-right: 1px solid #222; padding: 40px 20px; display: flex; flex-direction: column; gap: 10px; }
        .sidebar h2 { color: var(--club-gold); font-size: 1.1rem; letter-spacing: 2px; text-align: center; margin-bottom: 30px; }
        .nav-link { color: #888; text-decoration: none; font-weight: 700; font-size: 0.8rem; padding: 15px; border-radius: 6px; transition: 0.3s; cursor: pointer; text-transform: uppercase; }
        .nav-link.active, .nav-link:hover { background: #151515; color: var(--club-gold); border-left: 4px solid var(--club-gold); }

        /* ÁREA PRINCIPAL */
        .main { flex: 1; padding: 60px; overflow-y: auto; }
        h1 { margin-bottom: 40px; font-size: 2.5rem; text-transform: uppercase; font-weight: 900; }
        h1 span { color: var(--club-gold); }

        .admin-card { background: var(--card-bg); padding: 35px; border-radius: 12px; border: 1px solid #222; max-width: 800px; display: none; }
        .admin-card.active { display: block; animation: fadeIn 0.4s; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .full { grid-column: 1 / 3; }
        label { display: block; font-size: 0.75rem; font-weight: 900; color: var(--club-gold); margin-bottom: 8px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: white; border-radius: 6px; outline: none; }
        textarea { height: 100px; resize: none; }
        
        .btn-save { background: var(--club-gold); color: black; border: none; padding: 15px; width: 100%; margin-top: 25px; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn-save:hover { background: #D4AF37; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #toast { position: fixed; bottom: 20px; right: 20px; background: #2A803A; padding: 15px 30px; border-radius: 6px; display: none; font-weight: 900; z-index: 9999;}
    </style>
</head>
<body>
    <div class="sidebar">
        <img src="./escudolegion.png" style="width: 80px; margin: 0 auto 10px;" alt="Escudo">
        <h2>LEGIÓN ADMIN</h2>
        <div class="nav-link active" onclick="switchTab('partido', this)">📅 Partido</div>
        <div class="nav-link" onclick="switchTab('noticias', this)">📰 Noticias</div>
        <div class="nav-link" onclick="switchTab('tienda', this)">🛍️ Tienda</div>
        <div class="nav-link" onclick="switchTab('club', this)">🏛️ Info Club</div>
        <a href="index.html" class="nav-link" style="color: #ff4444; margin-top: auto;">🚪 Salir</a>
    </div>

    <div class="main">
        <h1>GESTIÓN <span>MODULAR</span></h1>

        <div class="admin-card active" id="tab-partido">
            <h2 style="color: var(--club-gold); margin-bottom: 20px;">Próximo Encuentro</h2>
            <form id="formPartido">
                <div class="form-grid">
                    <div><label>Rival</label><input type="text" id="rival" required></div>
                    <div><label>Torneo</label><input type="text" id="torneo" required></div>
                    <div><label>Fecha</label><input type="date" id="fecha" required></div>
                    <div><label>Hora</label><input type="time" id="hora" required></div>
                    <div class="full"><label>Estadio</label><input type="text" id="estadio" required></div>
                    <div class="full"><label>Escudo Rival (Imagen)</label><input type="file" id="logoRival" accept="image/*"></div>
                </div>
                <button type="submit" class="btn-save">Actualizar Partido</button>
            </form>
        </div>

        <div class="admin-card" id="tab-noticias">
            <h2 style="color: var(--club-gold); margin-bottom: 20px;">Publicar Noticia con Galería</h2>
            <form id="formNoticia">
                <div class="form-group">
                    <label>Título de la Noticia</label>
                    <input type="text" id="noticiaTitulo" required>
                </div>
                <div class="form-group" style="margin-top: 15px;">
                    <label>Contenido / Resumen</label>
                    <textarea id="noticiaContenido" required></textarea>
                </div>
                <div class="form-group" style="margin-top: 15px;">
                    <label>Fotos (Puedes seleccionar varias a la vez)</label>
                    <input type="file" id="noticiaFotos" accept="image/*" multiple required>
                </div>
                <button type="submit" class="btn-save">Publicar Noticia Oficial</button>
            </form>
        </div>

        <div class="admin-card" id="tab-tienda">
            <h2 style="color: var(--club-gold); margin-bottom: 20px;">Subir Producto a Tienda</h2>
            <p style="color: #888; font-size: 0.85rem; margin-bottom: 15px;">(Módulo en construcción para gestión de stock)</p>
            <form id="formTienda" style="opacity: 0.6; pointer-events: none;">
                <div class="form-grid">
                    <div class="full"><label>Nombre del Producto</label><input type="text" required></div>
                    <div><label>Precio</label><input type="number" required></div>
                    <div><label>Foto</label><input type="file"></div>
                </div>
                <button type="submit" class="btn-save">Añadir a Catálogo</button>
            </form>
        </div>

        <div class="admin-card" id="tab-club">
            <h2 style="color: var(--club-gold); margin-bottom: 20px;">Identidad Institucional</h2>
            <form id="formClub">
                <div class="form-group"><label>Misión</label><textarea id="clubMision" placeholder="Escribe la misión del club..."></textarea></div>
                <div class="form-group" style="margin-top: 15px;"><label>Visión</label><textarea id="clubVision" placeholder="Escribe la visión del club..."></textarea></div>
                <div class="form-group" style="margin-top: 15px;"><label>Historia Corta</label><textarea id="clubHistoria" placeholder="Escribe la historia del club..."></textarea></div>
                <button type="submit" class="btn-save">Guardar Información</button>
            </form>
        </div>
    </div>

    <div id="toast">¡DATOS ACTUALIZADOS! ✅</div>

    <script>
        // Cargar datos al abrir la página
        window.onload = function() {
            const partidoData = JSON.parse(localStorage.getItem('proxPartidoLegion'));
            if(partidoData) {
                document.getElementById('rival').value = partidoData.rival || '';
                document.getElementById('torneo').value = partidoData.torneo || '';
                document.getElementById('fecha').value = partidoData.fecha || '';
                document.getElementById('hora').value = partidoData.hora || '';
                document.getElementById('estadio').value = partidoData.estadio || '';
            }

            const clubData = JSON.parse(localStorage.getItem('clubInfoLegion'));
            if(clubData) {
                document.getElementById('clubMision').value = clubData.mision || '';
                document.getElementById('clubVision').value = clubData.vision || '';
                document.getElementById('clubHistoria').value = clubData.historia || '';
            }
        };

        function switchTab(tabId, el) {
            document.querySelectorAll('.admin-card').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            el.classList.add('active');
        }

        function mostrarToast(mensaje = '¡DATOS ACTUALIZADOS! ✅') {
            const toast = document.getElementById('toast');
            toast.innerHTML = mensaje;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }

        // Guardar Partido
        document.getElementById('formPartido').addEventListener('submit', function(e) {
            e.preventDefault();
            const file = document.getElementById('logoRival').files[0];
            const dataAnterior = JSON.parse(localStorage.getItem('proxPartidoLegion')) || {};
            
            const guardarInfo = (logoBase64) => {
                const data = {
                    rival: document.getElementById('rival').value,
                    torneo: document.getElementById('torneo').value,
                    fecha: document.getElementById('fecha').value,
                    hora: document.getElementById('hora').value,
                    estadio: document.getElementById('estadio').value,
                    logoRival: logoBase64
                };
                localStorage.setItem('proxPartidoLegion', JSON.stringify(data));
                mostrarToast('¡Partido Actualizado! ⚽');
            };

            if(file) {
                const reader = new FileReader();
                reader.onload = function(event) { guardarInfo(event.target.result); };
                reader.readAsDataURL(file);
            } else {
                guardarInfo(dataAnterior.logoRival || null);
            }
        });

        // Guardar Noticia con Galería
        document.getElementById('formNoticia').addEventListener('submit', async function(e) {
            e.preventDefault();
            const files = document.getElementById('noticiaFotos').files;
            const titulo = document.getElementById('noticiaTitulo').value;
            const contenido = document.getElementById('noticiaContenido').value;
            
            let imagenes = [];
            
            // Función para leer archivos como promesa
            const readImage = (file) => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (event) => resolve(event.target.result);
                    reader.readAsDataURL(file);
                });
            };

            // Procesar todas las imágenes seleccionadas
            for (let i = 0; i < files.length; i++) {
                const base64 = await readImage(files[i]);
                imagenes.push(base64);
            }

            const noticiaData = {
                titulo: titulo,
                contenido: contenido,
                imagenes: imagenes,
                fecha: new Date().toLocaleDateString('es-ES', { day: 'numeric', month: 'long' }).toUpperCase()
            };

            localStorage.setItem('noticiaLegion', JSON.stringify(noticiaData));
            mostrarToast('¡Noticia Publicada! 📰');
            this.reset(); // Limpia el formulario
        });

        // Guardar Info del Club
        document.getElementById('formClub').addEventListener('submit', function(e) {
            e.preventDefault();
            const info = {
                mision: document.getElementById('clubMision').value,
                vision: document.getElementById('clubVision').value,
                historia: document.getElementById('clubHistoria').value
            };
            localStorage.setItem('clubInfoLegion', JSON.stringify(info));
            mostrarToast('¡Info del Club Guardada! 🏛️');
        });
    </script>
</body>
</html>
