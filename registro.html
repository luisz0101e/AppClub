<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Legión Técnica</title>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --club-gold: #C5A059; --bg-deep: #050505; --card-bg: #0a0a0a;}
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Urbanist', sans-serif; }
        body { background: var(--bg-deep); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; overflow-y: auto;}
        
        .card { background: var(--card-bg); padding: 40px; border-radius: 8px; border: 1px solid #1a1a1a; width: 100%; max-width: 450px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: var(--club-gold); letter-spacing: 2px; margin-bottom: 25px; text-transform: uppercase; font-weight: 900; }
        
        .form-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-size: 0.75rem; font-weight: 900; color: var(--club-gold); margin-bottom: 5px; text-transform: uppercase; }
        input, select { width: 100%; padding: 14px; background: #111; border: 1px solid #222; color: white; border-radius: 6px; outline: none; transition: 0.3s; }
        input:focus, select:focus { border-color: var(--club-gold); }
        
        .btn { width: 100%; padding: 15px; background: var(--club-gold); color: black; border: none; font-weight: 900; text-transform: uppercase; cursor: pointer; border-radius: 6px; margin-top: 10px; transition: 0.3s; }
        .btn:hover { background: #D4AF37; transform: translateY(-2px); }
        
        #success { display: none; }
        .back-link { display: block; margin-top: 20px; color: #888; text-decoration: none; font-size: 0.8rem; font-weight: 700; }
    </style>
</head>
<body>
    <div class="card" id="formCard">
        <h2>Unirse a la Legión</h2>
        <form id="registroForm">
            <div class="form-group">
                <label>Nombre Completo</label>
                <input type="text" id="regNombre" required>
            </div>
            <div class="form-group">
                <label>Tipo de Usuario</label>
                <select id="regTipo" required>
                    <option value="Socio">Socio / Hincha</option>
                    <option value="Jugador">Jugador Oficial</option>
                </select>
            </div>
            <div class="form-group">
                <label>Foto de Perfil (Selfie)</label>
                <input type="file" id="regFoto" accept="image/*" required>
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" required>
            </div>
            <button type="submit" class="btn">Completar Registro</button>
            <a href="index.html" class="back-link">Volver al Login</a>
        </form>
    </div>

    <div class="card" id="success">
        <div style="font-size: 60px; color: #2A803A; margin-bottom: 10px;">✅</div>
        <h2>¡BIENVENIDO!</h2>
        <p style="color: #888; margin-bottom: 30px;">Tu perfil ha sido creado con éxito. Ahora tu foto aparecerá en la aplicación.</p>
        <a href="index.html" class="btn" style="text-decoration: none; display: block;">Ir al Login</a>
    </div>

    <script>
        document.getElementById('registroForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const nombre = document.getElementById('regNombre').value;
            const tipo = document.getElementById('regTipo').value;
            const archivoFoto = document.getElementById('regFoto').files[0];

            if(archivoFoto) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const usuarioNuevo = {
                        nombre: nombre,
                        tipo: tipo,
                        foto: event.target.result // Guardamos la foto en Base64
                    };
                    // Lo guardamos en la memoria del navegador simulando la base de datos
                    localStorage.setItem('usuarioLegionData', JSON.stringify(usuarioNuevo));
                    localStorage.setItem('usuarioLegion', nombre); // Para el login
                    
                    document.getElementById('formCard').style.display = 'none';
                    document.getElementById('success').style.display = 'block';
                };
                reader.readAsDataURL(archivoFoto);
            }
        });
    </script>
</body>
</html>
