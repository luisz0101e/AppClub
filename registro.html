<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Legión Técnica</title>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --club-gold: #C5A059; --bg-deep: #050505; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Urbanist', sans-serif; }
        body { background: var(--bg-deep); color: white; display: flex; justify-content: center; align-items: center; height: 100vh; padding: 20px; }
        .card { background: #0a0a0a; padding: 50px; border-radius: 0; border: 1px solid #1a1a1a; width: 100%; max-width: 450px; text-align: center; }
        h2 { color: var(--club-gold); letter-spacing: 2px; margin-bottom: 30px; text-transform: uppercase; }
        input { width: 100%; padding: 14px; background: #111; border: 1px solid #222; color: white; margin-bottom: 20px; border-radius: 4px; }
        .btn { width: 100%; padding: 16px; background: var(--club-gold); color: black; border: none; font-weight: 900; text-transform: uppercase; cursor: pointer; }
        #success { display: none; }
    </style>
</head>
<body>
    <div class="card" id="formCard">
        <h2>Unirse a la Legión</h2>
        <input type="text" placeholder="Nombre Completo">
        <input type="email" placeholder="Correo Electrónico">
        <input type="password" placeholder="Contraseña">
        <button class="btn" onclick="registrar()">Completar Registro</button>
    </div>
    <div class="card" id="success">
        <div style="font-size: 50px; color: #2A803A;">✅</div>
        <h2>¡BIENVENIDO!</h2>
        <p style="color: #888; margin-bottom: 30px;">Tu perfil ha sido creado con éxito.</p>
        <a href="index.html" class="btn" style="text-decoration: none; display: block;">Ir al Login</a>
    </div>
    <script>
        function registrar() {
            document.getElementById('formCard').style.display = 'none';
            document.getElementById('success').style.display = 'block';
        }
    </script>
</body>
</html>
