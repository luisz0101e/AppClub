<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legión Técnica - Portal Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --club-gold: #C5A059; --bg-deep: #050505; --card-bg: #0a0a0a; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Urbanist', sans-serif; }
        body {
            background-color: var(--bg-deep);
            background-image: radial-gradient(circle at top, #151515 0%, var(--bg-deep) 70%);
            color: #ffffff; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden;
        }
        .login-container {
            background: var(--card-bg); padding: 60px 40px; border-radius: 0px; width: 100%; max-width: 440px;
            text-align: center; border: 1px solid #1a1a1a; position: relative;
        }
        .login-container::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--club-gold), transparent);
        }
        .logo { width: 180px; margin-bottom: 30px; filter: drop-shadow(0 0 10px rgba(197, 160, 89, 0.2)); }
        h2 { font-size: 2.2rem; font-weight: 900; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 10px; }
        h2 span { color: var(--club-gold); }
        p { color: #888; font-size: 0.9rem; margin-bottom: 40px; text-transform: uppercase; letter-spacing: 2px; }
        .input-group { margin-bottom: 25px; text-align: left; }
        label { display: block; font-size: 0.75rem; color: var(--club-gold); font-weight: 900; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
        input {
            width: 100%; padding: 16px; background: #111; border: 1px solid #222; border-radius: 4px;
            color: white; font-size: 1rem; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--club-gold); background: #151515; }
        .btn-login {
            width: 100%; padding: 16px; background: var(--club-gold); color: black; border: none;
            font-weight: 900; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: 0.3s;
        }
        .btn-login:hover { background: #D4AF37; transform: scale(1.02); }
        .btn-register {
            display: block; width: 100%; padding: 14px; margin-top: 20px; background: transparent;
            color: var(--club-gold); border: 1px solid var(--club-gold); text-decoration: none;
            font-weight: 700; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <img src="./escudolegion.png" class="logo">
        <h2>LEGIÓN <span>TÉCNICA</span></h2>
        <p>Sistema de Gestión Deportiva</p>
        <form id="loginForm">
            <div class="input-group">
                <label>Usuario</label>
                <input type="text" id="username" placeholder="ADMIN / SOCIO" required>
            </div>
            <div class="input-group">
                <label>Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login">Ingresar</button>
            <a href="registro.html" class="btn-register">Registrarse</a>
        </form>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value.toLowerCase();
            localStorage.setItem('usuarioLegion', user.split('@')[0]);
            if (user === 'admin') { window.location.href = 'admin.html'; } 
            else { window.location.href = 'dashboard.html'; }
        });
    </script>
</body>
</html>
