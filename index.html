<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legión Técnica - Login</title>
    <style>
        :root {
            /* Tono Dorado Sofisticado */
            --club-gold: #C5A059; 
            /* Fondo oscuro profundo */
            --bg-deep: #0A0A0A; 
            /* Fondo de tarjeta sutil */
            --card-bg: #1A1A1A; 
            /* Fondo de inputs */
            --input-bg: #262626; 
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-deep);
            background-image: radial-gradient(circle at top, #222222 0%, var(--bg-deep) 70%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .login-container {
            background: var(--card-bg);
            padding: 50px 35px;
            border-radius: 12px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.7); 
            border: 1px solid #333; 
        }

        .logo {
            width: 160px; 
            height: auto; 
            object-fit: contain;
            margin-bottom: 25px;
            display: block; 
            margin-left: auto;
            margin-right: auto;
        }

        h2 {
            margin-bottom: 5px;
            font-size: 1.8rem;
            color: #ffffff;
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: 2.5px; /* Más espaciado para que se vea premium */
        }

        p {
            color: #888888;
            font-size: 0.95rem;
            margin-bottom: 35px;
            letter-spacing: 0.5px;
        }

        .input-group {
            margin-bottom: 22px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            margin-bottom: 8px;
            color: #aaaaaa;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 15px;
            background: var(--input-bg);
            border: 1px solid #3d3d3d; 
            border-radius: 6px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .input-group input:focus {
            border-color: var(--club-gold);
            box-shadow: 0 0 8px rgba(197, 160, 89, 0.3);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--club-gold);
            color: #121212;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.1s ease;
            margin-top: 10px;
        }

        .btn-login:hover {
            background: #D4AF37; 
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        .forgot-password {
            display: block;
            margin-top: 25px;
            color: var(--club-gold);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .forgot-password:hover {
            color: #ffffff; 
        }
    </style>
</head>
<body>

    <div class="login-container">
        <img src="./escudolegion.png" alt="Escudo de la Legión Técnica" class="logo">
        
        <h2>LEGIÓN TÉCNICA</h2>
        <p>Sistema de Gestión Deportiva</p>

        <form id="loginForm">
            <div class="input-group">
                <label for="username">Usuario o Correo</label>
                <input type="text" id="username" placeholder="Tu usuario" required>
            </div>

            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login">Iniciar Sesión</button>
        </form>

        <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault(); 
            const user = document.getElementById('username').value;
            
            const btn = document.querySelector('.btn-login');
            btn.innerHTML = "Verificando...";
            btn.style.opacity = "0.7";

            setTimeout(() => {
                alert("¡Bienvenido al sistema de Legión Técnica, " + user.split('@')[0] + "!");
                btn.innerHTML = "Iniciar Sesión";
                btn.style.opacity = "1";
            }, 1000);
        });
    </script>
</body>
</html>
