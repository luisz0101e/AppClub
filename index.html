<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - App del Club</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            /* Fondo oscuro elegante */
            background-color: #121212;
            background-image: radial-gradient(circle at top right, #2a2a2a, #121212);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .login-container {
            background: #1e1e1e;
            padding: 40px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border-top: 4px solid #FFD700; /* Borde superior dorado */
        }

        .logo {
            width: 100px;
            height: 100px;
            object-fit: contain;
            margin-bottom: 20px;
            border-radius: 50%;
            background: #2a2a2a; /* Fondo sutil por si el logo tiene transparencias */
            padding: 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        h2 {
            margin-bottom: 5px;
            font-size: 1.8rem;
            color: #ffffff;
        }

        p {
            color: #aaaaaa;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 8px;
            color: #cccccc;
            font-weight: bold;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .input-group input:focus {
            border-color: #FFD700;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: #FFD700;
            color: #121212;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.1s ease;
            margin-top: 10px;
        }

        .btn-login:hover {
            background: #e6c200;
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        .forgot-password {
            display: block;
            margin-top: 20px;
            color: #FFD700;
            text-decoration: none;
            font-size: 0.85rem;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <img src="./escudolegion.png" alt="Escudo del Club" class="logo">
        
        <h2>Portal del Club</h2>
        <p>Ingresa tus credenciales para continuar</p>

        <form id="loginForm">
            <div class="input-group">
                <label for="username">Usuario o Correo</label>
                <input type="text" id="username" placeholder="ejemplo@club.com" required>
            </div>

            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login">Iniciar Sesión</button>
        </form>

        <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
    </div>

    <script>
        // Lógica básica para capturar el intento de login
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Evita que la página se recargue
            
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            // Aquí luego conectaremos con la base de datos de tu NUC
            console.log("Intentando ingresar con:", user);
            
            // Simulación temporal de carga
            const btn = document.querySelector('.btn-login');
            btn.innerHTML = "Verificando...";
            btn.style.opacity = "0.7";

            setTimeout(() => {
                alert("¡Bienvenido al sistema, " + user + "!\n\n(Pronto te llevaremos al panel principal)");
                btn.innerHTML = "Iniciar Sesión";
                btn.style.opacity = "1";
            }, 1000);
        });
    </script>
</body>
</html>
